[build]
  command = "pip install -r requirements.txt"

[deploy]
  startCommand = "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
  healthcheckPath = "/health"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

[[envvars]]
  key = "PYTHONUTF8"
  value = "1"

[[envvars]]
  key = "TZ"
  value = "Asia/Tokyo"
